# AL-Tool v2 — ambiente local via Docker (só o sidecar; acessa pelo navegador).
#   docker compose up --build     → sobe em http://localhost:3100
#   docker compose down           → para
#   docker volume rm al-tool_altool-data   → reseta os dados
services:
  altool:
    build: .
    container_name: al-tool
    ports:
      - "3100:3000"          # host 3100 (a 3000 costuma estar ocupada) → container 3000
    volumes:
      - altool-data:/data    # persiste DuckDB + SQLite + uploads/exports entre restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:3000/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  altool-data:
